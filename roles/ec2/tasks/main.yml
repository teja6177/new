- name: Create security group
  amazon.aws.ec2_group:
    name: dns-sg
    description: DNS SG
    vpc_id: "{{ vpc_id }}"
    region: "{{ region }}"
    rules:
      - proto: tcp
        ports: 22
        cidr_ip: 0.0.0.0/0
      - proto: tcp
        ports: 53
        cidr_ip: 0.0.0.0/0
      - proto: udp
        ports: 53
        cidr_ip: 0.0.0.0/0
    rules_egress:
      - proto: all
        cidr_ip: 0.0.0.0/0
  register: sg

- name: Launch EC2 instance
  amazon.aws.ec2_instance:
    name: dns-server
    instance_type: "{{ instance_type }}"
    image_id: "{{ ami_id }}"
    key_name: "{{ key_name }}"
    vpc_subnet_id: "{{ subnet_id }}"
    security_group: dns-sg
    region: "{{ region }}"
    wait: yes
  register: ec2

- name: Wait for SSH
  wait_for:
    host: "{{ ec2.instances[0].public_ip_address }}"
    port: 22
    delay: 10
    timeout: 300

- name: Add instance to inventory
  add_host:
    name: "{{ ec2.instances[0].public_ip_address }}"
    groups: dns
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ private_key_path }}"