- name: Install Bind
  yum:
    name: bind
    state: present

- name: Ensure /var/named exists
  file:
    path: /var/named
    state: directory
    owner: named
    group: named
    mode: '0755'

- name: Deploy named.conf
  copy:
    src: named.conf
    dest: /etc/named.conf
    owner: root
    group: root
    mode: '0644'
  register: named_conf_result

- name: Deploy zone file
  template:
    src: kbvsm.com.zone.j2
    dest: "/var/named/{{ domain_name }}.zone"
    owner: named
    group: named
    mode: '0644'
  register: zone_result

# Validate only if something changed
- name: Validate named.conf
  command: named-checkconf
  when: named_conf_result.changed
  changed_when: false

- name: Validate zone file
  command: "named-checkzone {{ domain_name }} /var/named/{{ domain_name }}.zone"
  when: zone_result.changed
  changed_when: false

- name: Restart named if needed
  service:
    name: named
    state: restarted
  when: named_conf_result.changed or zone_result.changed

- name: Ensure named is running
  service:
    name: named
    state: started
    enabled: yes
