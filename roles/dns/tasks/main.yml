- name: Install bind
  yum:
    name: bind
    state: present

- name: Deploy named.conf
  copy:
    src: named.conf
    dest: /etc/named.conf
    owner: root
    group: root
    mode: '0644'

- name: Create zone file
  template:
    src: zone.j2
    dest: "/var/named/{{ domain_name }}.zone"
    owner: root
    group: root
    mode: '0644'

- name: Start named service
  service:
    name: named
    state: started
    enabled: yes
