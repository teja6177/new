- name: Create security group
  amazon.aws.ec2_security_group:
    name: dns-sg
    description: DNS SG
    vpc_id: "{{ vpc_id | default(omit) }}"
    region: "{{ region }}"
    rules:
      - proto: tcp
        ports: 22
        cidr_ip: "{{ allowed_ssh_ip }}"
      - proto: tcp
        ports: 53
        cidr_ip: 0.0.0.0/0
      - proto: udp
        ports: 53
        cidr_ip: 0.0.0.0/0
    rules_egress:
      - proto: all
        cidr_ip: 0.0.0.0/0
  register: sg

- name: Launch EC2 instance
  amazon.aws.ec2_instance:
    name: "{{ instance_name }}"
    instance_type: "{{ instance_type }}"
    image_id: "{{ ami_id }}"
    key_name: "{{ key_name }}"
    vpc_subnet_id: "{{ subnet_id }}"
    region: "{{ region }}"
    wait: yes
    security_group:
      - "{{ sg.group_id }}"
    network:
      assign_public_ip: true
  register: ec2

- name: Save instance facts
  set_fact:
    instance_id: "{{ ec2.instance_ids[0] }}"
    public_ip: "{{ ec2.instances[0].public_ip_address }}"

- name: Debug EC2 output
  debug:
    var: ec2

- name: Wait for SSH to come up
  wait_for:
    host: "{{ public_ip }}"
    port: 22
    delay: 10
    timeout: 300

- name: Wait for SSH connection
  wait_for_connection:
    timeout: 300

- name: Add host to inventory
  add_host:
    name: dns_server
    groups: dns
    ansible_host: "{{ public_ip }}"
    ansible_user: ec2-user
    ansible_ssh_private_key_file: "{{ private_key_path }}"

- name: Show instance info
  debug:
    msg: |
      EC2 instance launched successfully!
      Public IP: {{ public_ip }}
      Private IP: {{ ec2.instances[0].private_ip_address }}
      Instance ID: {{ instance_id }}
